[supervisord]
nodaemon=true
loglevel=info
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=/bin/sh -c "mkdir -p /var/run/php && php-fpm --nodaemonize"
autostart=true
autorestart=true
stdout_logfile=/var/log/php_fpm.log
stderr_logfile=/var/log/php_fpm.err

[program:app-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan queue:work --sleep=2 --tries=1 --timeout=80
autostart=true
autorestart=true
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/app_worker.log
stderr_logfile=/var/log/app_worker.err
